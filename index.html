<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YBÜ İzlem (iPad Pro)</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YBÜ İzlem">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/0d6efd/ffffff?text=YBÜ">

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0; padding: 15px; background-color: #e9ecef; padding-top: env(safe-area-inset-top);
        }
        .form-container { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 100%; }
        h1 { font-size: 1.8rem; text-align: center; margin: 0 0 5px; color: #1e466e; }
        h3 { font-size: 1.2rem; margin: 15px 0 10px; border-left: 5px solid #0d6efd; padding-left: 10px; background: #f8f9fa; }
        .grid-2, .grid-3, .grid-4, .grid-5 { display: grid; gap: 10px; margin-bottom: 10px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; }
        .grid-5 { grid-template-columns: repeat(2, 1fr); }
        .input-group { margin-bottom: 8px; }
        label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; background: white; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 10px 15px; background: #f1f5f9; padding: 10px; border-radius: 8px; }
        .radio-group label { display: inline-flex; align-items: center; gap: 5px; font-weight: normal; }
        input[type="radio"] { width: 22px; height: 22px; accent-color: #0d6efd; }
        .btn { background: #0d6efd; color: white; border: none; padding: 14px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn-success { background: #198754; }
        .btn-warning { background: #fd7e14; }
        .lab-panel { background: #e7f1ff; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .hidden { display: none; }
        .flex-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .kons-grid, .antibiyotik-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 20px; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
        @media (min-width: 768px) { .grid-4 { grid-template-columns: repeat(4, 1fr); } .grid-5, .kons-grid, .antibiyotik-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="form-container">
    <h1>🏥 YBÜ İZLEM (iPad)</h1>
    
    <div class="grid-3">
        <div class="input-group"><label>📅 Tarih</label><input type="date" id="tarih"></div>
        <div class="input-group"><label>⏰ Saat</label><input type="time" id="saat"></div>
        <div class="input-group"><label>📆 Yatış Günü</label><input type="text" id="yatisGunu"></div>
    </div>

    <h3>1. KİMLİK / YATAK</h3>
    <div class="grid-2">
        <div class="input-group"><label>Yatak No</label><input type="text" id="yatakNo"></div>
        <div class="input-group"><label>Hasta Adı / Soyadı</label><input type="text" id="hastaID"></div>
    </div>

    <div class="lab-panel">
        <h3 style="margin-top:0;">🔬 LABORATUVAR</h3>
        <div class="grid-5">
            <div class="input-group"><label>Hb</label><input type="text" id="labHb"></div>
            <div class="input-group"><label>WBC</label><input type="text" id="labWbc"></div>
            <div class="input-group"><label>PLT</label><input type="text" id="labPlt"></div>
            <div class="input-group"><label>Krea</label><input type="text" id="labKrea"></div>
            <div class="input-group"><label>Prokal</label><input type="text" id="labProkal"></div>
        </div>
        <div class="input-group"><label>🧪 Diğer / CRP</label><input type="text" id="labDiger"></div>
    </div>

    <h3>2. VİTALLER</h3>
    <div class="grid-4">
        <div class="input-group"><label>Ateş</label><input type="text" id="ates"></div>
        <div class="input-group"><label>Nabız</label><input type="text" id="nabiz"></div>
        <div class="input-group"><label>KB</label><input type="text" id="kanBasinci"></div>
        <div class="input-group"><label>SpO₂</label><input type="text" id="spo2"></div>
    </div>
    <div class="input-group">
        <label>Solunum</label>
        <div class="radio-group">
            <label><input type="radio" name="solunumTuru" value="Spontan"> Spontan</label>
            <label><input type="radio" name="solunumTuru" value="Nazal O2"> Nazal O2</label>
            <label><input type="radio" name="solunumTuru" value="HFNO"> HFNO</label>
            <label><input type="radio" name="solunumTuru" value="NIMV"> NIMV</label>
            <label><input type="radio" name="solunumTuru" value="IMV" id="imvRadio"> IMV</label>
        </div>
        <div id="imvModDiv" class="hidden" style="margin-top:8px;">
            <div class="radio-group">
                <label><input type="radio" name="ventMod" value="AC/PRVC"> AC/PRVC</label>
                <label><input type="radio" name="ventMod" value="CPAP"> CPAP</label>
                <label><input type="radio" name="ventMod" value="PSV"> PSV</label>
            </div>
        </div>
    </div>
    <div class="input-group"><label>💊 Vazopressör</label><input type="text" id="vazopressor"></div>

    <h3>3. NÖROLOJİ</h3>
    <div class="radio-group">
        <label><input type="radio" name="bilinc" value="Açık"> Açık</label>
        <label><input type="radio" name="bilinc" value="Somnolans"> Somno</label>
        <label><input type="radio" name="bilinc" value="Stupor"> Stupor</label>
        <label><input type="radio" name="bilinc" value="Koma"> Koma</label>
    </div>
    <div class="grid-2" style="margin-top:10px;">
        <div class="input-group"><label>GKS</label><input type="text" id="gks"></div>
        <div class="input-group"><label>Pupil</label><input type="text" id="pupiller"></div>
    </div>
    <div class="input-group"><label>Sedasyon</label><input type="text" id="sedasyon"></div>

    <h3>4. MUAYENE</h3>
    <div class="grid-2">
        <div class="input-group">
            <label>Akciğer</label>
            <div class="radio-group">
                <label><input type="radio" name="akciger" value="Doğal"> Doğal</label>
                <label><input type="radio" name="akciger" value="Ral/Ron"> Patol</label>
            </div>
        </div>
        <div class="input-group">
            <label>Batın</label>
            <div class="radio-group">
                <label><input type="radio" name="batin" value="Doğal"> Doğal</label>
                <label><input type="radio" name="batin" value="Dist"> Dist</label>
            </div>
        </div>
    </div>
    <div class="input-group">
        <label>Gaita</label>
        <div class="flex-row">
            <div class="radio-group">
                <label><input type="radio" name="gaita" value="Normal"> Norm</label>
                <label><input type="radio" name="gaita" value="Diyare"> Diya</label>
                <label><input type="radio" name="gaita" value="Yok"> Yok</label>
            </div>
            <input type="text" id="gaitaGun" style="width:60px;" placeholder="Gün">
        </div>
    </div>

    <h3>5. TEDAVİ / PLAN</h3>
    <div class="antibiyotik-grid">
        <input type="text" id="ab1" placeholder="AB 1">
        <input type="text" id="ab2" placeholder="AB 2">
        <input type="text" id="ab3" placeholder="AB 3">
    </div>
    <div class="grid-3" style="margin-top:10px;">
        <input type="number" id="aldigi" placeholder="Aldığı">
        <input type="number" id="cikardigi" placeholder="Çıkan">
        <input type="text" id="bilanco" placeholder="Bilanço" readonly>
    </div>
    <div class="input-group" style="margin-top:10px;"><label>Genel Plan</label><textarea id="plan" rows="2"></textarea></div>

    <button class="btn btn-success" onclick="listeyeEkle()">➕ KAYDET</button>
    
    <div style="margin-top: 30px;">
        <table id="hastaTablosu">
            <thead><tr><th>Yatak</th><th>Hasta</th><th>Sil</th></tr></thead>
            <tbody id="listeTbody"></tbody>
        </table>
    </div>

    <button class="btn" style="background:#0d6efd;" onclick="tumunuWordAktar()">📄 WORD'E AKTAR</button>
    <button class="btn" style="background:#6c757d;" onclick="listeyiTemizle()">🗑️ LİSTEYİ SIFIRLA</button>
</div>

<script>
    let hastaListesi = [];

    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        document.getElementById('tarih').value = now.toISOString().split('T')[0];
        document.getElementById('saat').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const stored = localStorage.getItem('ybu_v_final_secure');
        if (stored) {
            hastaListesi = JSON.parse(stored);
            listeGuncelle();
        }
    });

    document.querySelectorAll('input[name="solunumTuru"]').forEach(r => r.addEventListener('change', function() {
        document.getElementById('imvModDiv').classList.toggle('hidden', this.value !== 'IMV');
    }));

    function hesapla() {
        const a = parseFloat(document.getElementById('aldigi').value) || 0;
        const c = parseFloat(document.getElementById('cikardigi').value) || 0;
        document.getElementById('bilanco').value = (a - c > 0 ? '+' : '') + (a - c) + " cc";
    }
    document.getElementById('aldigi').addEventListener('input', hesapla);
    document.getElementById('cikardigi').addEventListener('input', hesapla);

    function getV(id) { return document.getElementById(id).value.trim(); }
    function getR(n) { const s = document.querySelector(`input[name="${n}"]:checked`); return s ? s.value : ''; }

    function listeyeEkle() {
        const v = {
            yatakNo: getV('yatakNo'), hastaID: getV('hastaID'), tarih: getV('tarih'), saat: getV('saat'),
            yatisGunu: getV('yatisGunu'), hb: getV('labHb'), wbc: getV('labWbc'), plt: getV('labPlt'),
            krea: getV('labKrea'), pro: getV('labProkal'), digerLab: getV('labDiger'),
            ates: getV('ates'), nabiz: getV('nabiz'), ta: getV('kanBasinci'), spo2: getV('spo2'),
            solTuru: getR('solunumTuru'), vMod: getR('ventMod'), vazo: getV('vazopressor'),
            bilinc: getR('bilinc'), gks: getV('gks'), pupil: getV('pupiller'), sed: getV('sedasyon'),
            akc: getR('akciger'), bat: getR('batin'), gaita: getR('gaita'), gaitaG: getV('gaitaGun'),
            ab1: getV('ab1'), ab2: getV('ab2'), ab3: getV('ab3'),
            ald: getV('aldigi'), cik: getV('cikardigi'), bil: getV('bilanco'), plan: getV('plan')
        };
        if (!v.yatakNo && !v.hastaID) return alert('Veri girin!');
        hastaListesi.push(v);
        localStorage.setItem('ybu_v_final_secure', JSON.stringify(hastaListesi));
        listeGuncelle();
        document.querySelectorAll('input[type=text], input[type=number], textarea').forEach(i => { if(i.id!=='tarih'&&i.id!=='saat') i.value=''; });
    }

    function listeGuncelle() {
        const b = document.getElementById('listeTbody'); b.innerHTML = '';
        hastaListesi.forEach((h, i) => {
            const r = document.createElement('tr');
            r.innerHTML = `<td>${h.yatakNo}</td><td>${h.hastaID}</td><td><button onclick="hastaSil(${i})" style="color:red;border:none;background:none;font-size:1.2rem;">❌</button></td>`;
            b.appendChild(r);
        });
    }

    function hastaSil(i) { if(confirm('Sil?')) { hastaListesi.splice(i, 1); localStorage.setItem('ybu_v_final_secure', JSON.stringify(hastaListesi)); listeGuncelle(); } }
    function listeyiTemizle() { if(confirm('Sıfırla?')) { hastaListesi = []; localStorage.removeItem('ybu_v_final_secure'); listeGuncelle(); } }

    function tumunuWordAktar() {
        if (hastaListesi.length === 0) return alert('Boş!');
        let h = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>";
        let c = "<h2>YBÜ VİZİT RAPORU</h2><br>";
        hastaListesi.forEach(x => {
            c += `<p><b>${x.yatakNo} / ${x.hastaID}</b> [G:${x.yatisGunu}] - ${x.tarih}</p>`;
            if(x.hb||x.wbc) c += `<p>Lab: Hb:${x.hb} WBC:${x.wbc} PLT:${x.plt} Krea:${x.krea} Pro:${x.pro} ${x.digerLab}</p>`;
            if(x.ates||x.ta) c += `<p>Vital: At:${x.ates} Nb:${x.nabiz} TA:${x.ta} SpO2:${x.spo2} Sol:${x.solTuru} ${x.vMod}</p>`;
            if(x.vazo) c += `<p>Vazo: ${x.vazo}</p>`;
            if(x.bilinc) c += `<p>Nöro: ${x.bilinc} GKS:${x.gks} Pupil:${x.pupil} Sed:${x.sed}</p>`;
            if(x.akc||x.bat) c += `<p>Muayene: Akc:${x.akc} Bat:${x.bat} Gaita:${x.gaita} [${x.gaitaG} gün]</p>`;
            if(x.ab1||x.ab2) c += `<p>Tedavi: ${x.ab1} ${x.ab2} ${x.ab3}</p>`;
            if(x.ald||x.cik) c += `<p>Sıvı: Ald:${x.ald} Çık:${x.cik} Bil:${x.bil}</p>`;
            if(x.plan) c += `<p>Plan: ${x.plan}</p>`;
            c += "<p>--------------------------------</p>";
        });
        const blob = new Blob([h + c + "</body></html>"], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "YBU_Rapor.doc";
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 150);
    }
</script>
</body>
</html>
