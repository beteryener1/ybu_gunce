<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YBÜ İzlem (iPad Pro Full)</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YBÜ İzlem">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/0d6efd/ffffff?text=YBÜ">

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0; padding: 15px; background-color: #e9ecef; padding-top: env(safe-area-inset-top);
        }
        .form-container { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 100%; }
        h1 { font-size: 1.8rem; text-align: center; margin: 0 0 5px; color: #1e466e; }
        h3 { font-size: 1.2rem; margin: 15px 0 10px; border-left: 5px solid #0d6efd; padding-left: 10px; background: #f8f9fa; }
        .grid-2, .grid-3, .grid-4, .grid-5 { display: grid; gap: 10px; margin-bottom: 10px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; }
        .grid-5 { grid-template-columns: repeat(2, 1fr); }
        .input-group { margin-bottom: 8px; }
        label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; background: white; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 10px 15px; background: #f1f5f9; padding: 10px; border-radius: 8px; }
        .radio-group label { display: inline-flex; align-items: center; gap: 5px; font-weight: normal; }
        input[type="radio"] { width: 22px; height: 22px; accent-color: #0d6efd; }
        .btn { background: #0d6efd; color: white; border: none; padding: 14px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn-success { background: #198754; }
        .btn-warning { background: #fd7e14; }
        .lab-panel { background: #e7f1ff; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .hidden { display: none; }
        .flex-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .kons-grid, .antibiyotik-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 20px; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
        @media (min-width: 768px) { .grid-4 { grid-template-columns: repeat(4, 1fr); } .grid-5, .kons-grid, .antibiyotik-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>

<div class="form-container">
    <h1>🏥 YBÜ İZLEM (iPad Pro)</h1>
    
    <div class="grid-3">
        <div class="input-group"><label>📅 Tarih</label><input type="date" id="tarih"></div>
        <div class="input-group"><label>⏰ Saat</label><input type="time" id="saat"></div>
        <div class="input-group"><label>📆 Yatış Günü</label><input type="text" id="yatisGunu"></div>
    </div>

    <h3>1. KİMLİK / YATAK</h3>
    <div class="grid-2">
        <div class="input-group"><label>Yatak No</label><input type="text" id="yatakNo"></div>
        <div class="input-group"><label>Hasta ID / Ad Soyad</label><input type="text" id="hastaID"></div>
    </div>

    <div class="lab-panel">
        <h3 style="margin-top:0;">🔬 LABORATUVAR</h3>
        <div class="grid-5">
            <div class="input-group"><label>Hb</label><input type="text" id="labHb"></div>
            <div class="input-group"><label>WBC</label><input type="text" id="labWbc"></div>
            <div class="input-group"><label>PLT</label><input type="text" id="labPlt"></div>
            <div class="input-group"><label>Kreatinin</label><input type="text" id="labKrea"></div>
            <div class="input-group"><label>Prokalsitonin</label><input type="text" id="labProkal"></div>
        </div>
        <div class="input-group"><label>🧪 Diğer Lab / CRP</label><input type="text" id="labDiger"></div>
    </div>

    <h3>2. VİTAL BULGULAR</h3>
    <div class="grid-4">
        <div class="input-group"><label>Ateş (°C)</label><input type="text" id="ates"></div>
        <div class="input-group"><label>Nabız (/dk)</label><input type="text" id="nabiz"></div>
        <div class="input-group"><label>Kan Basıncı</label><input type="text" id="kanBasinci"></div>
        <div class="input-group"><label>SpO₂ (%)</label><input type="text" id="spo2"></div>
    </div>
    <div class="grid-2">
        <div class="input-group">
            <label>Solunum Türü</label>
            <div class="radio-group">
                <label><input type="radio" name="solunumTuru" value="Spontan"> Spontan</label>
                <label><input type="radio" name="solunumTuru" value="Nazal O2"> Nazal O2</label>
                <label><input type="radio" name="solunumTuru" value="HFNO"> HFNO</label>
                <label><input type="radio" name="solunumTuru" value="NIMV"> NIMV</label>
                <label><input type="radio" name="solunumTuru" value="IMV" id="imvRadio"> IMV</label>
            </div>
            <div id="imvModDiv" class="hidden" style="margin-top:8px;">
                <label>Ventilatör Modu</label>
                <div class="radio-group">
                    <label><input type="radio" name="ventMod" value="AC/PRVC"> AC/PRVC</label>
                    <label><input type="radio" name="ventMod" value="CPAP"> CPAP</label>
                    <label><input type="radio" name="ventMod" value="PSV"> PSV</label>
                    <label><input type="radio" name="ventMod" value="SPS"> SPS</label>
                    <label><input type="radio" name="ventMod" value="Diğer"> Diğer</label>
                </div>
            </div>
        </div>
        <div class="input-group"><label>💊 Vazopressör / Doz</label><input type="text" id="vazopressor"></div>
    </div>

    <h3>3. NÖROLOJİ</h3>
    <div class="input-group">
        <label>Bilinç</label>
        <div class="radio-group">
            <label><input type="radio" name="bilinc" value="Açık"> Açık</label>
            <label><input type="radio" name="bilinc" value="Konfüze"> Konfüze</label>
            <label><input type="radio" name="bilinc" value="Somnolans"> Somnolans</label>
            <label><input type="radio" name="bilinc" value="Stupor"> Stupor</label>
            <label><input type="radio" name="bilinc" value="Koma"> Koma</label>
        </div>
    </div>
    <div class="grid-2">
        <div class="input-group"><label>GKS</label><input type="text" id="gks"></div>
        <div class="input-group">
            <label>Pupiller</label>
            <div class="radio-group">
                <label><input type="radio" name="pupiller" value="İzokorik"> İzokorik</label>
                <label><input type="radio" name="pupiller" value="Anizokorik"> Anizokorik</label>
                <label><input type="radio" name="pupiller" value="Midriyatik"> Midriyatik</label>
                <label><input type="radio" name="pupiller" value="Miyotik"> Miyotik</label>
                <label><input type="radio" name="pupiller" value="Diğer" id="pupilDigerRadio"> Diğer</label>
            </div>
            <input type="text" id="pupilDigerAciklama" style="margin-top:5px;" disabled placeholder="Açıklama">
        </div>
    </div>
    <div class="input-group"><label>Sedasyon</label><input type="text" id="sedasyon"></div>

    <h3>4. SOLUNUM MUAYENESİ</h3>
    <div class="input-group">
        <label>Akciğer Sesleri</label>
        <div class="radio-group">
            <label><input type="radio" name="akciger" value="Doğal"> Doğal</label>
            <label><input type="radio" name="akciger" value="Ral"> Ral</label>
            <label><input type="radio" name="akciger" value="Ronküs"> Ronküs</label>
            <label><input type="radio" name="akciger" value="Sert/Azalmış"> Sert/Azalmış</label>
        </div>
    </div>
    <div class="input-group"><label>Sekresyon</label><input type="text" id="sekresyon"></div>

    <h3>5. ABDOMİNAL MUAYENE</h3>
    <div class="grid-2">
        <div class="input-group">
            <label>Batın</label>
            <div class="radio-group">
                <label><input type="radio" name="batin" value="Doğal"> Doğal</label>
                <label><input type="radio" name="batin" value="Distandü"> Distandü</label>
                <label><input type="radio" name="batin" value="Hassas"> Hassas</label>
            </div>
        </div>
        <div class="input-group">
            <label>Bağırsak Sesleri</label>
            <div class="radio-group">
                <label><input type="radio" name="bagirsakSesleri" value="Normoaktif"> Normoaktif</label>
                <label><input type="radio" name="bagirsakSesleri" value="Hipoaktif"> Hipoaktif</label>
                <label><input type="radio" name="bagirsakSesleri" value="Hiperaktif"> Hiperaktif</label>
                <label><input type="radio" name="bagirsakSesleri" value="Yok"> Yok</label>
            </div>
        </div>
    </div>
    <div class="input-group">
        <label>Gaita</label>
        <div class="flex-row">
            <div class="radio-group">
                <label><input type="radio" name="gaita" value="Normal"> Normal</label>
                <label><input type="radio" name="gaita" value="Yumuşak"> Yumuşak</label>
                <label><input type="radio" name="gaita" value="Diyare"> Diyare</label>
                <label><input type="radio" name="gaita" value="Melena"> Melena</label>
                <label><input type="radio" name="gaita" value="Yok" id="gaitaYok"> Yok</label>
            </div>
            <div id="gaitaGunDiv"><label>Gün:</label><input type="text" id="gaitaGun" style="width:70px;" placeholder="No"></div>
        </div>
    </div>

    <h3>6. EKSTREMİTE</h3>
    <div class="radio-group">
        <label><input type="radio" name="ekstremite" value="Doğal" checked> Doğal</label>
        <label><input type="radio" name="ekstremite" value="Patolojik"> Patolojik</label>
    </div>
    <div class="input-group"><label>Patolojik Bulgu</label><input type="text" id="ekstremiteAciklama"></div>

    <h3>7. ENFEKSİYON</h3>
    <div class="input-group"><label>Odak</label><input type="text" id="enfeksiyonOdagi"></div>
    <div class="antibiyotik-grid">
        <div class="input-group"><label>Antibiyotik 1</label><input type="text" id="ab1"></div>
        <div class="input-group"><label>Antibiyotik 2</label><input type="text" id="ab2"></div>
        <div class="input-group"><label>Antibiyotik 3</label><input type="text" id="ab3"></div>
        <div class="input-group"><label>Antifungal</label><input type="text" id="antifungal"></div>
        <div class="input-group"><label>Antiviral</label><input type="text" id="antiviral"></div>
    </div>

    <h3>8. SIVI DENGESİ</h3>
    <div class="grid-3">
        <div class="input-group"><label>Aldığı (cc)</label><input type="text" id="aldigi"></div>
        <div class="input-group"><label>Çıkardığı (cc)</label><input type="text" id="cikardigi"></div>
        <div class="input-group"><label>Bilanço</label><input type="text" id="bilanco" readonly></div>
    </div>

    <h3>9. BESLENME</h3>
    <div class="radio-group">
        <label><input type="radio" name="beslenmeTip" value="Oral"> Oral</label>
        <label><input type="radio" name="beslenmeTip" value="Enteral" id="enteralRadio"> Enteral</label>
        <label><input type="radio" name="beslenmeTip" value="TPN" id="tpnRadio"> TPN</label>
        <label><input type="radio" name="beslenmeTip" value="Aç"> Aç</label>
        <label><input type="radio" name="beslenmeTip" value="" checked> Belirtilmedi</label>
    </div>
    <div id="beslenmeDetayDiv" class="input-group hidden" style="margin-top:8px;">
        <label>Beslenme Detayı</label>
        <input type="text" id="beslenmeDetay">
    </div>

    <h3>10. ANTİKOAGÜLASYON</h3>
    <div class="input-group"><input type="text" id="antikoagulasyon"></div>

    <h3>11. KONSÜLTASYON / PLAN</h3>
    <div class="kons-grid">
        <input type="text" id="kons1" placeholder="1."><input type="text" id="kons2" placeholder="2.">
        <input type="text" id="kons3" placeholder="3."><input type="text" id="kons4" placeholder="4.">
        <input type="text" id="kons5" placeholder="5.">
    </div>
    <div class="input-group"><label>Plan</label><textarea id="plan" rows="2"></textarea></div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 25px;">
        <button class="btn btn-success" onclick="listeyeEkle()">➕ LİSTEYE EKLE</button>
        <button class="btn btn-warning" onclick="formuTemizle()">🔄 TEMİZLE</button>
    </div>
    
    <div style="margin-top: 30px;">
        <h2>📋 Vizit Listesi (<span id="hastaSayisi">0</span>)</h2>
        <table id="hastaTablosu">
            <thead><tr><th>Yatak</th><th>Hasta</th><th>Bilinç</th><th>Sil</th></tr></thead>
            <tbody id="listeTbody"></tbody>
        </table>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button class="btn" onclick="tumunuWordAktar()" style="background:#0d6efd;">📄 WORD'E AKTAR</button>
        <button class="btn" onclick="listeyiTemizle()" style="background:#6c757d;">🗑️ LİSTEYİ SIFIRLA</button>
    </div>
</div>

<script>
    let hastaListesi = [];

    // Sayfa Yükleme
    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        document.getElementById('tarih').value = now.toISOString().split('T')[0];
        document.getElementById('saat').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const stored = localStorage.getItem('ybu_v_final_full');
        if (stored) {
            hastaListesi = JSON.parse(stored);
            listeGuncelle();
        }
    });

    // Dinamik Arayüz Kontrolleri
    document.querySelectorAll('input[name="solunumTuru"]').forEach(r => r.addEventListener('change', function() {
        document.getElementById('imvModDiv').classList.toggle('hidden', this.value !== 'IMV');
    }));
    document.querySelectorAll('input[name="pupiller"]').forEach(r => r.addEventListener('change', function() {
        document.getElementById('pupilDigerAciklama').disabled = this.value !== 'Diğer';
    }));
    document.querySelectorAll('input[name="beslenmeTip"]').forEach(r => r.addEventListener('change', function() {
        document.getElementById('beslenmeDetayDiv').classList.toggle('hidden', !(this.value === 'Enteral' || this.value === 'TPN'));
    }));

    // Bilanço Hesaplama
    function hesaplaBilanco() {
        const a = parseFloat(document.getElementById('aldigi').value) || 0;
        const c = parseFloat(document.getElementById('cikardigi').value) || 0;
        document.getElementById('bilanco').value = (a - c > 0 ? '+' : '') + (a - c).toFixed(0) + ' cc';
    }
    document.getElementById('aldigi').addEventListener('input', hesaplaBilanco);
    document.getElementById('cikardigi').addEventListener('input', hesaplaBilanco);

    // Veri Çekme Fonksiyonları
    function getVal(id) { return document.getElementById(id).value.trim(); }
    function getRadio(name) { const s = document.querySelector(`input[name="${name}"]:checked`); return s ? s.value : ''; }

    // Listeye Ekleme
    function listeyeEkle() {
        const veri = {
            tarih: getVal('tarih'), saat: getVal('saat'), yatisGunu: getVal('yatisGunu'),
            yatakNo: getVal('yatakNo'), hastaID: getVal('hastaID'),
            hb: getVal('labHb'), wbc: getVal('labWbc'), plt: getVal('labPlt'), krea: getVal('labKrea'), pro: getVal('labProkal'), digerLab: getVal('labDiger'),
            ates: getVal('ates'), nabiz: getVal('nabiz'), ta: getVal('kanBasinci'), spo2: getVal('spo2'),
            solTuru: getRadio('solunumTuru'), ventMod: getRadio('ventMod'), vazo: getVal('vazopressor'),
            bilinc: getRadio('bilinc'), gks: getVal('gks'), pupil: getRadio('pupiller'), pupilDiger: getVal('pupilDigerAciklama'), sed: getVal('sedasyon'),
            akc: getRadio('akciger'), sekresyon: getVal('sekresyon'),
            batin: getRadio('batin'), bs: getRadio('bagirsakSesleri'), gaita: getRadio('gaita'), gaitaG: getVal('gaitaGun'),
            ekst: getRadio('ekstremite'), ekstA: getVal('ekstremiteAciklama'),
            enf: getVal('enfeksiyonOdagi'), ab1: getVal('ab1'), ab2: getVal('ab2'), ab3: getVal('ab3'), afung: getVal('antifungal'), avir: getVal('antiviral'),
            ald: getVal('aldigi'), cik: getVal('cikardigi'), bil: getVal('bilanco'),
            beslenme: getRadio('beslenmeTip'), beslenmeD: getVal('beslenmeDetay'),
            anti: getVal('antikoagulasyon'),
            kons1: getVal('kons1'), kons2: getVal('kons2'), kons3: getVal('kons3'), kons4: getVal('kons4'), kons5: getVal('kons5'),
            plan: getVal('plan')
        };

        if (!veri.yatakNo && !veri.hastaID) return alert('Yatak No veya Hasta ID girin!');
        
        hastaListesi.push(veri);
        localStorage.setItem('ybu_v_final_full', JSON.stringify(hastaListesi));
        listeGuncelle();
        formuTemizle();
    }

    function listeGuncelle() {
        const tbody = document.getElementById('listeTbody');
        tbody.innerHTML = '';
        hastaListesi.forEach((h, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${h.yatakNo}</td><td>${h.hastaID}</td><td>${h.bilinc}</td><td><button onclick="hastaSil(${i})" style="color:red; background:none; border:none; font-size:1.2rem;">❌</button></td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('hastaSayisi').innerText = hastaListesi.length;
    }

    function hastaSil(i) {
        if(confirm('Kayıt silinsin mi?')) {
            hastaListesi.splice(i, 1);
            localStorage.setItem('ybu_v_final_full', JSON.stringify(hastaListesi));
            listeGuncelle();
        }
    }

    function formuTemizle() {
        document.querySelectorAll('input[type=text], textarea').forEach(i => {
            if(i.id !== 'tarih' && i.id !== 'saat') i.value = '';
        });
        document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
        document.getElementById('bilanco').value = '';
    }

    function listeyiTemizle() {
        if(confirm('Tüm liste silinsin mi?')) {
            hastaListesi = [];
            localStorage.removeItem('ybu_v_final_full');
            listeGuncelle();
        }
    }

    // Word Aktarımı (iPad Uyumlu)
    function tumunuWordAktar() {
        if (hastaListesi.length === 0) return alert('Liste boş!');
        
        let header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>";
        let footer = "</body></html>";
        let docContent = "<h2>YBÜ VİZİT RAPORU</h2><br>";

        hastaListesi.forEach(x => {
            docContent += `<p><b>HASTA: ${x.yatakNo} / ${x.hastaID}</b> ${x.yatisGunu ? '[Gün: '+x.yatisGunu+']' : ''} - ${x.tarih} ${x.saat}</p>`;
            
            let labArr = [];
            if(x.hb) labArr.push(`Hb:${x.hb}`); if(x.wbc) labArr.push(`WBC:${x.wbc}`); if(x.plt) labArr.push(`PLT:${x.plt}`); if(x.krea) labArr.push(`Krea:${x.krea}`); if(x.pro) labArr.push(`Pro:${x.pro}`);
            if(labArr.length > 0) docContent += `<p>Lab: ${labArr.join(' ')} ${x.digerLab ? '['+x.digerLab+']' : ''}</p>`;

            let vitArr = [];
            if(x.ates) vitArr.push(`Ateş:${x.ates}`); if(x.nabiz) vitArr.push(`Nb:${x.nabiz}`); if(x.ta) vitArr.push(`TA:${x.ta}`); if(x.spo2) vitArr.push(`SpO2:${x.spo2}`);
            if(x.solTuru) vitArr.push(`Sol:${x.solTuru}${x.ventMod ? '('+x.ventMod+')' : ''}`);
            if(vitArr.length > 0) docContent += `<p>Vital: ${vitArr.join(' ')}</p>`;

            if(x.vazo) docContent += `<p>Vazopressör: ${x.vazo}</p>`;

            let noroArr = [];
            if(x.bilinc) noroArr.push(`Bilinç:${x.bilinc}`); if(x.gks) noroArr.push(`GKS:${x.gks}`); 
            if(x.pupil) noroArr.push(`Pupil:${x.pupil}${x.pupilDiger ? '('+x.pupilDiger+')' : ''}`);
            if(x.sed) noroArr.push(`Sedasyon:${x.sed}`);
            if(noroArr.length > 0) docContent += `<p>Nöroloji: ${noroArr.join(' ')}</p>`;

            let muayArr = [];
            if(x.akc) muayArr.push(`Akciğer:${x.akc}`); if(x.sekresyon) muayArr.push(`Sekresyon:${x.sekresyon}`);
            if(x.batin) muayArr.push(`Batın:${x.batin}`); if(x.bs) muayArr.push(`BS:${x.bs}`);
            if(x.gaita) muayArr.push(`Gaita:${x.gaita}${x.gaitaG ? '('+x.gaitaG+' gün)' : ''}`);
            if(muayArr.length > 0) docContent += `<p>Muayene: ${muayArr.join(' ')}</p>`;

            if(x.ekst !== 'Doğal' || x.ekstA) docContent += `<p>Ekstremite: ${x.ekst} ${x.ekstA ? '['+x.ekstA+']' : ''}</p>`;

            let enfArr = [];
            if(x.enf) enfArr.push(`Odak:${x.enf}`); if(x.ab1) enfArr.push(x.ab1); if(x.ab2) enfArr.push(x.ab2); if(x.ab3) enfArr.push(x.ab3);
            if(x.afung) enfArr.push(`Antifung:${x.afung}`); if(x.avir) enfArr.push(`Antivir:${x.avir}`);
            if(enfArr.length > 0) docContent += `<p>Enfeksiyon: ${enfArr.join(' ')}</p>`;

            if(x.ald || x.cik) docContent += `<p>Sıvı: Ald:${x.ald} Çık:${x.cik} Bil:${x.bil}</p>`;
            if(x.beslenme) docContent += `<p>Beslenme: ${x.beslenme} ${x.beslenmeD ? '['+x.beslenmeD+']' : ''}</p>`;
            if(x.anti) docContent += `<p>Antikoagülan: ${x.anti}</p>`;

            let konsArr = [x.kons1, x.kons2, x.kons3, x.kons4, x.kons5].filter(c => c).join(', ');
            if(konsArr) docContent += `<p>Konsültasyon: ${konsArr}</p>`;
            if(x.plan) docContent += `<p>Plan: ${x.plan}</p>`;

            docContent += `<p>-------------------------------------------</p>`;
        });

        const fullHtml = header + docContent + footer;
        const blob = new Blob([fullHtml], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); 
        a.href = url; 
        a.download = "YBU_Vizit_Raporu.doc";
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 200);
    }
</script>
</body>
</html>
