<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YBÜ Panel Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; padding: 5px; background: #f4f7f9; font-size: 11px; color: #333; }
        .panel { background: white; border-radius: 8px; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { font-size: 14px; text-align: center; margin: 0 0 5px; color: #1e466e; }
        
        /* Bölüm Başlıkları */
        h3 { font-size: 10px; margin: 4px 0 2px; padding: 2px 5px; background: #e9ecef; border-radius: 3px; font-weight: 600; text-transform: uppercase; color: #495057; }
        
        /* Satır Düzeni */
        .row { display: grid; gap: 4px; margin-bottom: 3px; align-items: center; }
        .row-top { grid-template-columns: 1fr 0.8fr 0.8fr 2fr; }
        .row-lab { grid-template-columns: repeat(5, 1fr) 2.5fr; background: #f0f8ff; padding: 3px; border-radius: 4px; }
        .row-vitals { grid-template-columns: repeat(4, 1fr) 2fr; }
        .row-flex { display: flex; flex-wrap: wrap; gap: 4px; }

        /* Giriş Elemanları */
        input, select, textarea { width: 100%; padding: 4px 6px; border: 1px solid #ced4da; border-radius: 4px; font-size: 12px; }
        .radio-box { display: flex; align-items: center; gap: 3px; background: #fff; border: 1px solid #dee2e6; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
        .radio-box label { font-size: 10px; cursor: pointer; display: flex; align-items: center; gap: 2px; }
        input[type="radio"] { width: 14px; height: 14px; margin: 0; }

        .btn-group { display: grid; grid-template-columns: 3fr 1fr; gap: 5px; margin-top: 8px; }
        .btn { padding: 8px; border: none; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-save { background: #28a745; }
        .btn-clear { background: #6c757d; }
        .hidden { display: none; }
        
        /* Tablo */
        .list-area { margin-top: 10px; border-top: 1px solid #ddd; padding-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        td { padding: 3px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="panel">
    <h1>🏥 YBÜ İZLEM PANELİ</h1>

    <div class="row row-top">
        <input type="date" id="tarih">
        <input type="time" id="saat">
        <input type="text" id="yatakNo" placeholder="Yatak No">
        <input type="text" id="hastaID" placeholder="Hasta ID / Ad Soyad">
    </div>

    <div class="lab-panel">
        <div class="row row-lab">
            <input type="text" id="labHb" placeholder="Hb">
            <input type="text" id="labWbc" placeholder="WBC">
            <input type="text" id="labPlt" placeholder="PLT">
            <input type="text" id="labKrea" placeholder="Krea">
            <input type="text" id="labPro" placeholder="Prok">
            <input type="text" id="labDiger" placeholder="Diğer Lab / CRP / Laktat">
        </div>
    </div>

    <h3>VİTALLER & VAZOPRESSÖR</h3>
    <div class="row row-vitals">
        <input type="text" id="ates" placeholder="Ateş">
        <input type="text" id="nabiz" placeholder="Nabız">
        <input type="text" id="kb" placeholder="Kan Basıncı">
        <input type="text" id="spo2" placeholder="SpO2">
        <input type="text" id="vazopressor" placeholder="Vazopressör Doz">
    </div>

    <h3>SOLUNUM SİSTEMİ</h3>
    <div class="row-flex">
        <div class="radio-box">
            <label><input type="radio" name="akc" value="Doğal"> Doğal</label>
            <label><input type="radio" name="akc" value="Ral"> Ral</label>
            <label><input type="radio" name="akc" value="Ronküs"> Ronküs</label>
            <label><input type="radio" name="akc" value="Azalmış"> Azalmış</label>
            <label><input type="radio" name="akc" value="Sessiz"> Sessiz</label>
        </div>
        <input type="text" id="sekresyon" placeholder="Sekresyon" style="flex:1; min-width:100px;">
    </div>
    <div class="row-flex" style="margin-top:3px;">
        <div class="radio-box">
            <label><input type="radio" name="solTuru" value="Spontan"> Spon</label>
            <label><input type="radio" name="solTuru" value="Nazal"> Nazal</label>
            <label><input type="radio" name="solTuru" value="HFNO"> HFNO</label>
            <label><input type="radio" name="solunumTuru" value="NIMV"> NIMV</label>
            <label><input type="radio" name="solTuru" value="IMV" id="imvCheck"> IMV</label>
        </div>
        <div id="imvModlar" class="radio-box hidden" style="background:#fff3cd;">
            <label><input type="radio" name="vMod" value="AC/PRVC"> PRVC</label>
            <label><input type="radio" name="vMod" value="CPAP"> CPAP</label>
            <label><input type="radio" name="vMod" value="PSV"> PSV</label>
            <label><input type="radio" name="vMod" value="SPS"> SPS</label>
        </div>
    </div>

    <h3>NÖROLOJİ</h3>
    <div class="row-flex">
        <div class="radio-box">
            <label><input type="radio" name="bilinc" value="Açık"> Açık</label>
            <label><input type="radio" name="bilinc" value="Konfüze"> Konf</label>
            <label><input type="radio" name="bilinc" value="Somno"> Som</label>
            <label><input type="radio" name="bilinc" value="Stupor"> Stup</label>
            <input type="text" id="gks" placeholder="GKS" style="width:35px; margin-left:3px;">
        </div>
        <div class="radio-box">
            <label>Pupil:</label>
            <label><input type="radio" name="pupil" value="İzo"> İzo</label>
            <label><input type="radio" name="pupil" value="Ani"> Ani</label>
            <label><input type="radio" name="pupil" value="Mid"> Mid</label>
            <label><input type="radio" name="pupil" value="Miyo"> Miyo</label>
            <label><input type="radio" name="pupil" value="Diğer" id="pupilDigerCheck"> Diğ</label>
        </div>
    </div>
    <div class="row" id="noroDetay" style="grid-template-columns: 1fr 1fr; margin-top:2px;">
        <input type="text" id="sedasyon" placeholder="Sedasyon Detayı">
        <input type="text" id="pupilAciklama" class="hidden" placeholder="Pupil Diğer Açıklaması">
    </div>

    <h3>ABDOMEN & EKSTREMİTE</h3>
    <div class="row-flex">
        <div class="radio-box">
            <label>BS:</label>
            <label><input type="radio" name="bs" value="Norm"> N</label>
            <label><input type="radio" name="bs" value="Hipo"> Hipo</label>
            <label><input type="radio" name="bs" value="Hiper"> Hiper</label>
            <label><input type="radio" name="bs" value="Yok"> Yok</label>
        </div>
        <div class="radio-box">
            <label>Gaita:</label>
            <label><input type="radio" name="gaita" value="Norm"> N</label>
            <label><input type="radio" name="gaita" value="Yum"> Y</label>
            <label><input type="radio" name="gaita" value="Diya"> D</label>
            <label><input type="radio" name="gaita" value="Melena"> M</label>
            <label><input type="radio" name="gaita" value="Yok"> Yok</label>
            <input type="text" id="gaitaGun" placeholder="Gün" style="width:25px; margin-left:2px;">
        </div>
    </div>
    <div class="radio-box" style="margin-top:3px;">
        <label>Ekstremite:</label>
        <label><input type="radio" name="ekst" value="Doğal"> Doğal</label>
        <label><input type="radio" name="ekst" value="Patol"> Patol</label>
        <input type="text" id="ekstAciklama" placeholder="Patolojik bulgu detayı" style="flex:1; margin-left:5px;">
    </div>

    <h3>RENAL & SIVI & BESLENME</h3>
    <div class="row" style="grid-template-columns: 1fr 1fr;">
        <div class="radio-box">
            <label><input type="radio" name="renal" value="Spon"> Spon</label>
            <label><input type="radio" name="renal" value="HD"> HD</label>
            <label><input type="radio" name="renal" value="CRRT"> CRRT</label>
        </div>
        <input type="text" id="siviDenge" placeholder="Sıvı: Aldığı/Çıkardığı (+500 vb)">
    </div>
    <div class="row" style="grid-template-columns: 1fr 1.2fr;">
        <div class="radio-box">
            <label>Bes:</label>
            <label><input type="radio" name="beslenme" value="Oral"> Oral</label>
            <label><input type="radio" name="beslenme" value="Enteral" id="entCheck"> Ent</label>
            <label><input type="radio" name="beslenme" value="TPN" id="tpnCheck"> TPN</label>
            <label><input type="radio" name="beslenme" value="Aç"> Aç</label>
        </div>
        <input type="text" id="beslenmeDoz" placeholder="Doz / İçerik">
    </div>

    <h3>ENFEKSİYON & TEDAVİ</h3>
    <div class="row" style="grid-template-columns: 1fr 2fr;">
        <input type="text" id="enfOdak" placeholder="Enf. Odağı">
        <input type="text" id="ab_antiviral" placeholder="Antiviral / Antifungal">
    </div>
    <div class="row" style="grid-template-columns: 1fr 1fr 1fr;">
        <input type="text" id="ab1" placeholder="Antibiyotik 1">
        <input type="text" id="ab2" placeholder="Antibiyotik 2">
        <input type="text" id="ab3" placeholder="Antibiyotik 3">
    </div>

    <div class="row" style="grid-template-columns: 1fr 1fr; margin-top:5px;">
        <input type="text" id="anti_ulser" placeholder="Antikoag / Ülser Prof.">
        <input type="text" id="kons" placeholder="Konsültasyonlar">
    </div>
    <textarea id="plan" rows="1" placeholder="Genel Plan..."></textarea>

    <div class="btn-group">
        <button class="btn btn-save" onclick="listeyeEkle()">➕ HASTAYI KAYDET</button>
        <button class="btn btn-clear" onclick="formuTemizle()">🔄 TEMİZLE</button>
    </div>

    <div class="list-area">
        <table id="vizitTablosu">
            <tbody id="listeTbody"></tbody>
        </table>
    </div>

    <div class="row" style="margin-top:5px; grid-template-columns: 1fr 1fr;">
        <button class="btn" onclick="tumunuWordAktar()" style="background:#0d6efd;">📄 WORD/PDF AKTAR</button>
        <button class="btn" onclick="listeyiTemizle()" style="background:#dc3545;">🗑️ LİSTEYİ SİL</button>
    </div>
</div>

<script>
    let hastaListesi = [];

    // Dinamik Alan Kontrolleri
    document.addEventListener('change', (e) => {
        if(e.target.name === 'solTuru') document.getElementById('imvModlar').classList.toggle('hidden', e.target.id !== 'imvCheck');
        if(e.target.name === 'pupil') document.getElementById('pupilAciklama').classList.toggle('hidden', e.target.id !== 'pupilDigerCheck');
    });

    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        document.getElementById('tarih').value = now.toISOString().split('T')[0];
        document.getElementById('saat').value = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
        const stored = localStorage.getItem('ybu_v_final');
        if (stored) { hastaListesi = JSON.parse(stored); listeGuncelle(); }
    });

    function getV(id) { return document.getElementById(id).value.trim(); }
    function getR(n) { const s = document.querySelector(`input[name="${n}"]:checked`); return s ? s.value : ''; }

    function listeyeEkle() {
        const v = {
            tarih: getV('tarih'), saat: getV('saat'), yatak: getV('yatakNo'), id: getV('hastaID'),
            hb: getV('labHb'), wbc: getV('labWbc'), plt: getV('labPlt'), krea: getV('labKrea'), pro: getV('labPro'), digL: getV('labDiger'),
            at: getV('ates'), nb: getV('nabiz'), kb: getV('kb'), sp: getV('spo2'), vazo: getV('vazopressor'),
            akc: getR('akc'), sek: getV('sekresyon'), solT: getR('solTuru'), vMod: getR('vMod'),
            bil: getR('bilinc'), gks: getV('gks'), pup: getR('pupil'), pupA: getV('pupilAciklama'), sed: getV('sedasyon'),
            bs: getR('bs'), gai: getR('gaita'), gaiG: getV('gaitaGun'), ekst: getR('ekst'), eksA: getV('ekstAciklama'),
            renal: getR('renal'), sivi: getV('siviDenge'), bes: getR('beslenme'), besD: getV('beslenmeDoz'),
            odak: getV('enfOdak'), ab1: getV('ab1'), ab2: getV('ab2'), ab3: getV('ab3'), antiv: getV('ab_antiviral'),
            antiU: getV('anti_ulser'), kons: getV('kons'), plan: getV('plan')
        };
        if(!v.yatak && !v.id) return alert('Veri girin!');
        hastaListesi.push(v);
        localStorage.setItem('ybu_v_final', JSON.stringify(hastaListesi));
        listeGuncelle();
        formuTemizle();
    }

    function listeGuncelle() {
        const b = document.getElementById('listeTbody'); b.innerHTML = '';
        hastaListesi.forEach((h, i) => {
            const r = document.createElement('tr');
            r.innerHTML = `<td><b>${h.yatak}</b> - ${h.id}</td><td style="text-align:right"><button onclick="hastaSil(${i})" style="color:red;border:none;background:none;font-size:1.2rem;">❌</button></td>`;
            b.appendChild(r);
        });
    }

    function hastaSil(i) { if(confirm('Sil?')) { hastaListesi.splice(i, 1); localStorage.setItem('ybu_v_final', JSON.stringify(hastaListesi)); listeGuncelle(); } }
    
    function formuTemizle() {
        document.querySelectorAll('input[type=text], textarea').forEach(i => { if(i.id!=='tarih' && i.id!=='saat') i.value=''; });
        document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
    }

    function listeyiTemizle() { if(confirm('Sıfırla?')) { hastaListesi = []; localStorage.removeItem('ybu_v_final'); listeGuncelle(); } }

    function tumunuWordAktar() {
        if (hastaListesi.length === 0) return alert('Boş!');
        let h = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body style='font-family:Arial; font-size:10pt;'>";
        let c = "<h2>YBÜ VİZİT RAPORU</h2><br>";
        hastaListesi.forEach(x => {
            c += `<p><b>${x.yatak} / ${x.id}</b> - ${x.tarih} ${x.saat}</p>`;
            if(x.hb) c += `<p>Lab: Hb:${x.hb} WBC:${x.wbc} PLT:${x.plt} Krea:${x.krea} Prok:${x.pro} ${x.digL}</p>`;
            c += `<p>Vital: At:${x.at} Nb:${x.nb} KB:${x.kb} SpO2:${x.sp} Vazo:${x.vazo}</p>`;
            c += `<p>Solunum: Akc:${x.akc} [${x.sek}] Tür:${x.solT} ${x.vMod||''}</p>`;
            c += `<p>Nöroloji: Bil:${x.bil} GKS:${x.gks} Pupil:${x.pup} [${x.pupA}] Sed:${x.sed}</p>`;
            c += `<p>Muayene: BS:${x.bs} Gaita:${x.gai} [${x.gaiG}g] Ekst:${x.ekst} [${x.eksA}]</p>`;
            c += `<p>Renal/Sıvı/Bes: ${x.renal} | Sıvı:${x.sivi} | Bes:${x.bes} [${x.besD}]</p>`;
            c += `<p>Enfeksiyon: Odak:${x.odak} AB:${x.ab1}, ${x.ab2}, ${x.ab3} | Antiv:${x.antiv}</p>`;
            if(x.antiU || x.kons || x.plan) c += `<p>Plan: ${x.antiU} | Kons:${x.kons} | Not:${x.plan}</p>`;
            c += "<hr>";
        });
        const blob = new Blob([h + c + "</body></html>"], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "YBU_Rapor.doc";
        document.body.appendChild(a); a.click();
    }
</script>
</body>
</html>
